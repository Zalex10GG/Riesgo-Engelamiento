<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Engelamiento - Aviation Weather</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Main Map Container -->
        <div id="map"></div>

        <!-- Glassmorphism Overlay: Header -->
        <header class="glass-panel header">
            <h1>Riesgo de Engelamiento</h1>
        </header>

        <!-- Glassmorphism Overlay: Controls -->
        <div class="glass-panel controls">
            <div class="top-controls">
                <div class="playback-controls">
                    <button id="prevBtn" class="control-btn">⏮</button>
                    <button id="playBtn" class="control-btn play">▶</button>
                    <button id="nextBtn" class="control-btn">⏭</button>
                </div>
                <div class="mode-selector">
                    <button id="modeTopBtn" class="mode-btn">Nivel Inferior</button>
                    <button id="modeBottomBtn" class="mode-btn active">Nivel Superior</button>
                </div>
            </div>
            
            <div class="timeline-container">
                <input type="range" id="timeSlider" min="0" max="10" value="0" step="1">
                <div class="time-display">
                    <span id="currentTime">Cargando datos...</span>
                </div>
            </div>
        </div>

        <!-- Glassmorphism Overlay: Legend -->
        <div class="glass-panel legend">
            <h3>Presión / Altitud</h3>
            <div class="legend-table">
                <div class="legend-row"><span class="color p300"></span><span>300 hPa</span><span>9000m</span></div>
                <div class="legend-row"><span class="color p500"></span><span>500 hPa</span><span>5500m</span></div>
                <div class="legend-row"><span class="color p700"></span><span>700 hPa</span><span>3000m</span></div>
                <div class="legend-row"><span class="color p850"></span><span>850 hPa</span><span>1500m</span></div>
                <div class="legend-row"><span class="color p1000"></span><span>1000 hPa</span><span>0m</span></div>
            </div>
        </div>

        <!-- Info Panel with Coordinates -->
        <div class="glass-panel info">
            <button id="trajectoryBtn" class="action-btn">
                <span class="icon">✈️</span> Perfil de trayectoria
            </button>
            <div class="info-item coords">
                <span class="label">Lat:</span>
                <span class="value" id="latDisplay">--</span>
            </div>
            <div class="info-item coords">
                <span class="label">Lon:</span>
                <span class="value" id="lonDisplay">--</span>
            </div>
        </div>

        <!-- Trajectory Profile Panel (Hidden by default) -->
        <div id="profilePanel" class="glass-panel profile-panel hidden">
            <div class="profile-header">
                <h3>Perfil Vertical de Trayectoria</h3>
                <button id="closeProfileBtn" class="close-btn">&times;</button>
            </div>
            <div class="profile-content">
                <div id="profileChart"></div>
            </div>
            <div class="profile-footer">
                <div class="path-info">
                    <span>A: <span id="pointA">--</span></span>
                    <span>B: <span id="pointB">--</span></span>
                    <span>Dist: <span id="totalDist">--</span> km</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Plotly JS for the profile chart -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Custom JS -->
    <script src="../static/js/app.js"></script>
</body>
</html>
